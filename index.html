<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nameless Gold Emporium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color:#eaeaea;
}

header {
  padding:25px;
  text-align:center;
  color:#d4af37;
  font-size:28px;
}

.container {padding:20px;}

.card {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(212,175,55,0.2);
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

.table {width:100%;margin-top:20px;border-collapse:collapse;}
.table th,.table td {padding:12px;text-align:center;}
.table th {color:#d4af37;}

.rank {color:#ffd700;font-weight:bold;}

button {
  background:linear-gradient(145deg,#d4af37,#a67c00);
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

input, select {
  background:#111;
  color:#fff;
  border:1px solid rgba(212,175,55,0.2);
  padding:10px;
  border-radius:8px;
}

.top-btn {
  position:fixed;
  top:20px;
  right:20px;
}
</style>
</head>

<body>

<header>
👑 NAMELESS GOLD EMPORIUM 👑<br>
<small>Elite Wealth System</small>
</header>

<div class="top-btn">
<button onclick="showLogin()">Admin</button>
</div>

<div class="container">

<div class="card">
<h3>Total Nilai Aset</h3>
<h1 id="totalValue">0</h1>
</div>

<div class="card">
<h3>🏆 Top Sultan</h3>
<div id="ranking"></div>
</div>

<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>Nama</th>
<th>Gold</th>
<th>Iron</th>
<th>Diamond</th>
<th>Total</th>
</tr>
</thead>
<tbody id="assetTable"></tbody>
</table>

</div>

<!-- LOGIN ADMIN -->
<div class="container" id="loginPage" style="display:none;">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="container" id="adminPage" style="display:none;">

<input id="owner" placeholder="Nama">
<input id="ownerEmail" placeholder="Email">
<select id="type">
<option>Gold</option>
<option>Diamond</option>
<option>Iron</option>
</select>
<input id="amount" type="number" placeholder="Jumlah">
<button onclick="addAsset()">Tambah</button>

<br><br>

<select id="priceType">
<option>Gold</option>
<option>Diamond</option>
<option>Iron</option>
</select>
<input id="newPrice" type="number" placeholder="Harga Baru">
<button onclick="updatePrice()">Update Harga</button>

<table class="table">
<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Nilai</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyCLVox6XIwq7E_8ejMEYqaFOfp0sZZEkyU",
  authDomain:"namelessgold-a109e.firebaseapp.com",
  projectId:"namelessgold-a109e"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let prices={};

// LOAD PRICE
db.collection("prices").onSnapshot(s=>{
  s.forEach(doc=>prices[doc.id]=doc.data().value);
});

// LOGIN
function showLogin(){loginPage.style.display='block';}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(res=>{
    if(res.user.email!=="admin@email.com"){alert("Bukan admin");return;}
    loginPage.style.display='none';
    adminPage.style.display='block';
  }).catch(e=>alert(e.message));
}

// ADMIN
function addAsset(){
  db.collection("assets").add({
    owner:owner.value,
    email:ownerEmail.value,
    type:type.value,
    amount:parseInt(amount.value)
  });
}

function updateAsset(id,val){
  db.collection("assets").doc(id).update({amount:parseInt(val)});
}

function deleteAsset(id){
  db.collection("assets").doc(id).delete();
}

function updatePrice(){
  db.collection("prices").doc(priceType.value)
  .set({value:parseInt(newPrice.value)});
}

// RENDER
db.collection("assets").onSnapshot(s=>{
  let total=0,grouped={};
  assetTable.innerHTML='';adminTable.innerHTML='';ranking.innerHTML='';

  s.forEach(doc=>{
    let a=doc.data(),v=a.amount*(prices[a.type]||0);
    total+=v;

    adminTable.innerHTML+=`
    <tr>
    <td>${a.owner}</td>
    <td>${a.email}</td>
    <td>${a.type}</td>
    <td><input value="${a.amount}" onchange="updateAsset('${doc.id}',this.value)"></td>
    <td>${v}</td>
    <td><button onclick="deleteAsset('${doc.id}')">X</button></td>
    </tr>`;

    if(!grouped[a.owner]) grouped[a.owner]={owner:a.owner,gold:0,iron:0,diamond:0,total:0};
    if(a.type=="Gold") grouped[a.owner].gold+=a.amount;
    if(a.type=="Iron") grouped[a.owner].iron+=a.amount;
    if(a.type=="Diamond") grouped[a.owner].diamond+=a.amount;
    grouped[a.owner].total+=v;
  });

  Object.values(grouped).sort((a,b)=>b.total-a.total).forEach((a,i)=>{
    assetTable.innerHTML+=`
    <tr>
    <td class="rank">#${i+1}</td>
    <td>${a.owner}</td>
    <td>${a.gold}</td>
    <td>${a.iron}</td>
    <td>${a.diamond}</td>
    <td>${a.total}</td>
    </tr>`;
    if(i<3) ranking.innerHTML+=`<div>#${i+1} ${a.owner} - ${a.total}</div>`;
  });

  totalValue.innerText=total;
});
</script>

</body>
</html>
