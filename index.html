<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nameless Gold Emporium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:#fff;
  overflow-x:hidden;
}

/* GOLD RAIN */
.gold {
  position: fixed;
  top: -50px;
  color: gold;
  font-size: 20px;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(110vh); }
}

header {
  padding:20px;
  text-align:center;
  color:gold;
  font-size:26px;
  text-shadow:0 0 10px gold;
}

.container {padding:20px;}

.card {
  background:rgba(255,215,0,0.05);
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 0 15px rgba(255,215,0,0.2);
}

.table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

.table th,.table td {
  padding:12px;
  border-bottom:1px solid #333;
  text-align:center;
}

.table th {
  color:gold;
}

tr:hover {
  background:rgba(255,215,0,0.05);
}

button {
  padding:10px 20px;
  background:gold;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

input, select {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.login-btn {
  position:fixed;
  top:20px;
  right:20px;
}

.rank {
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🏆 Nameless Gold Emporium - VVIP Vault</header>
<button class="login-btn" onclick="showLogin()">Admin</button>

<div class="container">
<div class="card">
  <h3>Total Nilai Aset: <span id="totalValue">0</span></h3>
</div>

<div class="card">
  <h3>🏆 Top Sultan</h3>
  <div id="ranking"></div>
</div>

<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>Pemilik</th>
<th>Gold</th>
<th>Iron</th>
<th>Diamond</th>
<th>Total</th>
</tr>
</thead>
<tbody id="assetTable"></tbody>
</table>
</div>

<!-- LOGIN -->
<div class="container" id="loginPage" style="display:none;">
  <h3>Login Admin</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div class="container" id="adminPage" style="display:none;">
<div class="card">
  <h3>Admin Panel</h3>
  <input type="text" id="owner" placeholder="Nama">
  <select id="type">
    <option>Gold</option>
    <option>Diamond</option>
    <option>Iron</option>
  </select>
  <input type="number" id="amount" placeholder="Jumlah">
  <button onclick="addAsset()">Tambah</button>
</div>

<table class="table">
<thead>
<tr>
<th>Pemilik</th>
<th>Jenis</th>
<th>Jumlah</th>
<th>Nilai</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCLVox6XIwq7E_8ejMEYqaFOfp0sZZEkyU",
  authDomain: "namelessgold-a109e.firebaseapp.com",
  projectId: "namelessgold-a109e",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let prices = { Gold:400000, Diamond:650000, Iron:10000 };

function showLogin(){
  document.getElementById('loginPage').style.display='block';
}

function login(){
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  auth.signInWithEmailAndPassword(email,password)
  .then(()=>{
    document.getElementById('loginPage').style.display='none';
    document.getElementById('adminPage').style.display='block';
  })
  .catch(()=>alert('Login gagal'));
}

function addAsset(){
  let owner = document.getElementById('owner').value;
  let type = document.getElementById('type').value;
  let amount = parseInt(document.getElementById('amount').value);

  if(!owner || !amount) return alert('Isi data');

  db.collection('assets').add({ owner,type,amount });
}

function deleteAsset(id){
  db.collection('assets').doc(id).delete();
}

// COUNT UP ANIMATION
function animateValue(id, start, end, duration) {
  let obj = document.getElementById(id);
  let range = end - start;
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);
    obj.innerText = Math.floor(progress * range + start);
    if (progress < 1) requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

// GOLD RAIN
setInterval(()=>{
  let gold = document.createElement("div");
  gold.className = "gold";
  gold.style.left = Math.random()*100+"%";
  gold.style.animationDuration = (2 + Math.random()*3)+"s";
  gold.innerText = "💰";
  document.body.appendChild(gold);

  setTimeout(()=>gold.remove(),5000);
},300);

// RENDER
function render(){
  db.collection('assets').onSnapshot(snapshot=>{
    let publicTable = document.getElementById('assetTable');
    let adminTable = document.getElementById('adminTable');
    let rankingDiv = document.getElementById('ranking');

    publicTable.innerHTML='';
    adminTable.innerHTML='';
    rankingDiv.innerHTML='';

    let total=0;
    let grouped = {};

    snapshot.forEach(doc=>{
      let a = doc.data();
      let value = a.amount * prices[a.type];

      adminTable.innerHTML += `
      <tr>
        <td>${a.owner}</td>
        <td>${a.type}</td>
        <td>${a.amount}</td>
        <td>${value}</td>
        <td><button onclick="deleteAsset('${doc.id}')">Hapus</button></td>
      </tr>`;

      if(!grouped[a.owner]){
        grouped[a.owner] = {
          owner: a.owner,
          gold: 0,
          iron: 0,
          diamond: 0,
          total: 0
        };
      }

      if(a.type === "Gold") grouped[a.owner].gold += a.amount;
      if(a.type === "Iron") grouped[a.owner].iron += a.amount;
      if(a.type === "Diamond") grouped[a.owner].diamond += a.amount;

      grouped[a.owner].total += value;
      total += value;
    });

    let sorted = Object.values(grouped).sort((a,b)=>b.total-a.total);

    sorted.forEach((a,i)=>{
      publicTable.innerHTML += `
      <tr>
        <td class="rank">#${i+1}</td>
        <td>${a.owner}</td>
        <td>${a.gold}</td>
        <td>${a.iron}</td>
        <td>${a.diamond}</td>
        <td>${a.total}</td>
      </tr>`;

      if(i < 3){
        rankingDiv.innerHTML += `<div class="rank">#${i+1} ${a.owner} - ${a.total}</div>`;
      }
    });

    animateValue("totalValue", 0, total, 1000);
  });
}

render();
</script>

</body>
</html>
